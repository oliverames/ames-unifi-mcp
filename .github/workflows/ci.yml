name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: |
          go mod download
          go mod verify

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@2026.1 ./...

      - name: Scan dependencies for known vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Validate Node launch and packaging scripts
        run: node --check install.js scripts/build-mcpb.mjs mcpb/server/launch.js

      - name: Build release targets
        run: make build-all
