name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate tag and package version
        run: |
          package_version=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_NAME#v}" != "$package_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version" >&2
            exit 1
          fi

      - name: Verify source
        run: |
          go mod download
          go mod verify
          test -z "$(gofmt -l .)"
          go test -race ./...
          go vet ./...
          go run honnef.co/go/tools/cmd/staticcheck@2026.1 ./...
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Build binaries and MCPB bundle
        run: |
          make clean
          make mcpb

      - name: Generate SBOM and checksums
        run: |
          version=${GITHUB_REF_NAME#v}
          go run github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0 \
            mod -json -licenses -output "dist/ames-unifi-mcp-${version}.cdx.json" .
          (
            cd dist
            shasum -a 256 \
              ames-unifi-mcp-darwin-arm64 \
              ames-unifi-mcp-darwin-amd64 \
              ames-unifi-mcp-linux-arm64 \
              ames-unifi-mcp-linux-amd64 \
              "ames-unifi-mcp-${version}.mcpb" \
              "ames-unifi-mcp-${version}.cdx.json" \
              > SHA256SUMS
          )

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ames-unifi-mcp-${{ github.ref_name }}
          path: |
            dist/ames-unifi-mcp-darwin-*
            dist/ames-unifi-mcp-linux-*
            dist/*.mcpb
            dist/*.cdx.json
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/ames-unifi-mcp-darwin-*
            dist/ames-unifi-mcp-linux-*
            dist/*.mcpb
            dist/*.cdx.json
            dist/SHA256SUMS
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing required GitHub Actions secret: NPM_TOKEN" >&2
            exit 2
          fi
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          published=$(npm view "${package_name}@${package_version}" version 2>/dev/null || true)
          if [ "$published" != "$package_version" ]; then
            npm publish --access public --provenance
          fi
